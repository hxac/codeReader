# 被分析仓库列表。analyze.py 会顺序处理这里的每一项，为每个项目生成 <Project>-tutorial/ 教程。
# 字段：
#   name    必填，"owner/repo"。不写 url 时自动推导为 https://github.com/<name>.git
#   url     可选，显式克隆地址（私有仓/自托管/GitLab 等用它）
#   branch  可选，缺省=仓库默认分支
#   project 可选，教程文件夹名前缀；缺省= name 的最后一段（如 kvcache-ai/Mooncake → Mooncake）
#   focus   可选，user_focus：希望教程侧重的内容，会进 prompt
#   folders 可选，子目录拆分：字符串列表，如 [clang, cmake, libc]。配上后该仓库不再整体处理，
#           而是把每个子目录展开成一个独立的头等项目（共享同一份 clone，但各自独立规划/生成/
#           续传/发布）。适合 llvm/llvm-project 这种 LLM 不会自动细分的巨型 monorepo。
#           每个 folder 的 project 自动取 {project}-{folder}，state key 为 name@folder，
#           claude 直接在该子目录里跑（CWD 落子目录），只看得到该子目录。仅支持一级子目录。
